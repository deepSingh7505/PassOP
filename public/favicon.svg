<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#1a2a3a"/>

  <!-- Left angle bracket < -->
  <text
    x="4"
    y="46"
    font-family="'Courier New', Courier, monospace"
    font-size="36"
    font-weight="700"
    fill="#4ade80"
  >&lt;</text>

  <!-- Right angle bracket > -->
  <text
    x="44"
    y="46"
    font-family="'Courier New', Courier, monospace"
    font-size="36"
    font-weight="700"
    fill="#4ade80"
  >&gt;</text>

  <!-- Key icon in the center -->
  <!-- Key head (circle) -->
  <circle cx="32" cy="26" r="8" fill="none" stroke="#ffffff" stroke-width="3"/>
  <!-- Key shaft -->
  <line x1="32" y1="34" x2="32" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Key teeth -->
  <line x1="32" y1="40" x2="37" y2="40" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="45" x2="36" y2="45" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
</svg>